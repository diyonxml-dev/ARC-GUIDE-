<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ARC Guide</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Fredoka',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

overflow:hidden;
background:#65d8ff;
display:flex;
height:100vh;

}


/* ===============================

BACKGROUND

================================*/

.ocean{

position:fixed;
left:0;
top:0;
width:100%;
height:100%;
overflow:hidden;

background:

linear-gradient(

180deg,

#8ee8ff 0%,

#63d7ff 20%,

#3cbdf6 55%,

#1595d1 100%

);

z-index:-5;

}


/* SUN */

.sun{

position:absolute;

top:-180px;
left:50%;

transform:translateX(-50%);

width:700px;
height:700px;

background:

radial-gradient(circle,
rgba(255,255,255,.9),
rgba(255,255,255,.2),
transparent 70%);

filter:blur(20px);

}


/* LIGHT */

.light{

position:absolute;

width:100%;
height:100%;

background:

linear-gradient(

to bottom,

rgba(255,255,255,.18),

transparent 45%

);

pointer-events:none;

}


/* ===============================

BUBBLE

================================*/

.bubble{

position:absolute;

bottom:-100px;

background:

rgba(255,255,255,.35);

border-radius:50%;

animation:float linear infinite;

backdrop-filter:blur(2px);

}

.bubble::after{

content:"";

position:absolute;

width:30%;

height:30%;

background:white;

border-radius:50%;

top:18%;

left:18%;

opacity:.7;

}

@keyframes float{

0%{

transform:translateY(0);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:translateY(-120vh);

opacity:0;

}

}


/* ===============================

SEAWEED

================================*/

.seaweed{

position:absolute;

bottom:0;

width:100px;

height:250px;

background:

linear-gradient(

to right,

#29b25d,

#42d66b

);

clip-path:

polygon(

40% 100%,

47% 80%,

44% 60%,

50% 40%,

45% 0,

55% 0,

60% 40%,

57% 70%,

65% 100%

);

animation:wave 4s ease-in-out infinite;

transform-origin:bottom;

opacity:.9;

}

@keyframes wave{

0%{

transform:rotate(-2deg);

}

50%{

transform:rotate(3deg);

}

100%{

transform:rotate(-2deg);

}

}


/* ===============================

CORAL

================================*/

.coral{

position:absolute;

bottom:0;

width:170px;
height:160px;

background:#ff8db7;

clip-path:polygon(

50% 100%,

48% 70%,

38% 55%,

43% 30%,

30% 10%,

38% 0,

50% 20%,

58% 0,

68% 15%,

58% 35%,

66% 55%,

54% 72%

);

}


/* ===============================

SAND

================================*/

.sand{

position:absolute;

bottom:0;

width:100%;
height:120px;

background:#ffe29a;

}


/* ===============================

SHELL

================================*/

.shell{

position:absolute;

bottom:55px;

width:45px;

height:30px;

background:#ffd3f2;

border-radius:50px 50px 0 0;

}


/* ===============================

STARFISH

================================*/

.star{

position:absolute;

bottom:70px;

font-size:28px;

transform:rotate(20deg);

}


/* ===============================

SIDEBAR

================================*/

.sidebar{

width:270px;

background:

rgba(255,255,255,.15);

backdrop-filter:blur(18px);

border-right:

2px solid rgba(255,255,255,.2);

padding:25px;

overflow:auto;

z-index:5;

}


/* LOGO */

.logo{

display:flex;

align-items:center;

gap:12px;

margin-bottom:25px;

}

.logo img{

width:60px;

height:60px;

border-radius:50%;

box-shadow:

0 0 25px rgba(148,77,255,.45);

}

.logo h2{

font-size:27px;

color:white;

}

.logo p{

font-size:13px;

color:#eafcff;

}


/* MENU */

.menu{

margin-top:20px;

display:flex;

flex-direction:column;

gap:12px;

}

.menu button{

border:none;

padding:15px;

border-radius:16px;

cursor:pointer;

background:

rgba(255,255,255,.2);

color:white;

font-size:17px;

transition:.35s;

text-align:left;

}

.menu button:hover{

transform:translateX(8px);

background:#8c5cff;

box-shadow:

0 10px 25px rgba(140,92,255,.4);

}

.menu button.active{

background:#7d49ff;

}


/* ===============================

CONTENT

================================*/

.content{

flex:1;

padding:35px;

overflow:auto;

}

.card{

background:

rgba(255,255,255,.22);

backdrop-filter:blur(18px);

border-radius:28px;

padding:35px;

min-height:calc(100vh - 70px);

border:2px solid rgba(255,255,255,.2);

box-shadow:

0 25px 45px rgba(0,0,0,.15);

animation:fade .5s;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:none;

}

}

h1{

font-size:42px;

color:white;

margin-bottom:15px;

}

h2{

margin-top:30px;

margin-bottom:15px;

color:#2148b6;

}

p{

line-height:1.9;

font-size:18px;

color:#17465d;

}

.box{

background:white;

padding:20px;

border-radius:18px;

margin-top:20px;

margin-bottom:20px;

border-left:8px solid #8d63ff;

}

ul{

margin-left:22px;

line-height:2;

color:#17465d;

}

ol{

margin-left:25px;

line-height:2;

color:#17465d;

}

code{

background:#eef7ff;

padding:3px 7px;

border-radius:6px;

}


/* MOBILE */

@media(max-width:850px){

body{

flex-direction:column;

overflow:auto;

}

.sidebar{

width:100%;

height:auto;

}

.content{

padding:20px;

}

.card{

min-height:auto;

}

}
</style>
</head>

<body>

<div class="ocean">

<div class="sun"></div>
<div class="light"></div>

<!-- Bubble -->

<div class="bubble" style="left:5%;width:18px;height:18px;animation-duration:8s;"></div>
<div class="bubble" style="left:12%;width:35px;height:35px;animation-duration:12s;"></div>
<div class="bubble" style="left:22%;width:15px;height:15px;animation-duration:7s;"></div>
<div class="bubble" style="left:32%;width:26px;height:26px;animation-duration:10s;"></div>
<div class="bubble" style="left:45%;width:20px;height:20px;animation-duration:11s;"></div>
<div class="bubble" style="left:60%;width:32px;height:32px;animation-duration:13s;"></div>
<div class="bubble" style="left:72%;width:16px;height:16px;animation-duration:8s;"></div>
<div class="bubble" style="left:84%;width:25px;height:25px;animation-duration:9s;"></div>
<div class="bubble" style="left:95%;width:18px;height:18px;animation-duration:11s;"></div>

<!-- Seaweed -->

<div class="seaweed" style="left:2%;"></div>
<div class="seaweed" style="left:10%;height:220px;"></div>
<div class="seaweed" style="left:82%;"></div>
<div class="seaweed" style="left:93%;height:240px;"></div>

<!-- Coral -->

<div class="coral" style="left:5%;"></div>
<div class="coral" style="right:6%;background:#ff9dd6;"></div>

<!-- Shell -->

<div class="shell" style="left:25%;"></div>
<div class="shell" style="right:28%;"></div>

<!-- Star -->

<div class="star" style="left:48%;">⭐</div>
<div class="star" style="left:68%;">⭐</div>

<div class="sand"></div>

</div>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<img src="logo.png">

<div>

<h2>🪼 ARC</h2>

<p>Community Guide</p>

</div>

</div>

<div class="menu">

<button class="active" onclick="showPage('home',this)">
🏠 Home
</button>

<button onclick="showPage('discord',this)">
💬 Discord Guide
</button>

<button onclick="showPage('music',this)">
🎵 Music
</button>

<button onclick="showPage('voice',this)">
🎤 Temp Voice
</button>

<button onclick="showPage('level',this)">
⭐ Level
</button>

<button onclick="showPage('staff',this)">
👥 Staff
</button>

<button onclick="showPage('faq',this)">
❓ FAQ
</button>

</div>

</div>

<!-- CONTENT -->

<div class="content">

<div class="card" id="page">

</div>

</div>

<script>

const pages={

home:`

<h1>🪼 Welcome to ARC</h1>

<p>

Selamat datang di ARC!

Semoga kamu betah, mendapatkan teman baru, dan menikmati semua fitur yang tersedia di server ini.

</p>

<div class="box">

<b>🌊 Apa yang bisa dilakukan di ARC?</b>

<ul>

<li>🎮 Bermain game bersama.</li>

<li>🎤 Voice Chat dengan member lain.</li>

<li>🎵 Mendengarkan musik.</li>

<li>⭐ Naik level dan mendapatkan role.</li>

<li>💬 Mengobrol bersama komunitas.</li>

</ul>

</div>

<h2>🏖️ Untuk Member Baru</h2>

<p>

Tidak perlu bingung jika masih baru menggunakan Discord.

Guide ini akan membantu kamu mengenal seluruh fitur yang tersedia di ARC.

</p>

<div class="box">

🪼 Selamat menikmati komunitas ARC!

</div>

`,

discord:`

<h1>💬 Discord Guide</h1>

<p>

Discord adalah tempat untuk mengobrol, bermain game, voice chat, dan bertemu teman baru.

</p>

<h2>📂 Jenis Channel</h2>

<ul>

<li>💬 Text Channel</li>

<li>🎤 Voice Channel</li>

<li>📢 Announcement</li>

<li>🎮 Gaming Channel</li>

</ul>

<h2>🔔 Mention</h2>

<div class="box">

<b>@user</b>

Digunakan untuk memanggil seseorang.

<br><br>

<b>@everyone</b>

Memberitahu seluruh anggota server.

</div>

<h2>💡 Tips</h2>

<ul>

<li>Gunakan channel sesuai topiknya.</li>

<li>Hormati seluruh member.</li>

<li>Jangan spam.</li>

</ul>

`,

music:`

<h1>🎵 Music System</h1>

<p>

ARC menyediakan bot musik agar kamu bisa mendengarkan lagu bersama teman.

</p>

<h2>🎧 Cara Memutar Lagu</h2>

<ol>

<li>Masuk ke Voice Channel.</li>

<li>Buka channel command.</li>

<li>Ketik command berikut.</li>

</ol>

<div class="box">

<code>m!play nama lagu</code>

<br><br>

Contoh

<br>

<code>m!play perfect</code>

</div>

<h2>🎼 Command</h2>

<ul>

<li>▶️ m!play</li>

<li>⏸️ m!pause</li>

<li>▶️ m!resume</li>

<li>⏭️ m!skip</li>

<li>📃 m!queue</li>

<li>⏹️ m!stop</li>

</ul>

`,

voice:`

<h1>🎤 Temp Voice</h1>

<p>

Temp Voice memungkinkan kamu membuat Voice Channel pribadi secara otomatis.

</p>

<h2>➕ Cara Membuat</h2>

<ol>

<li>Masuk ke channel Buat Channel.</li>

<li>Tunggu beberapa detik.</li>

<li>Channel akan dibuat otomatis.</li>

</ol>

<div class="box">

🔒 Lock Channel

<br>

🔓 Unlock

<br>

✏ Rename

<br>

👑 Transfer Owner

<br>

👥 Member Limit

</div>

`,level:`

<h1>⭐ Level System</h1>

<p>

Semakin aktif kamu di ARC, semakin tinggi level yang akan didapatkan.

</p>

<h2>📈 Cara Mendapatkan XP</h2>

<ul>

<li>💬 Aktif mengirim pesan.</li>

<li>🎮 Bermain bersama member.</li>

<li>🎉 Mengikuti event server.</li>

<li>🤝 Berinteraksi dengan komunitas.</li>

</ul>

<div class="box">

<b>🎁 Reward</b>

<ul>

<li>⭐ Role Level</li>

<li>🏅 Menunjukkan keaktifan</li>

<li>🎉 Unlock role tertentu</li>

</ul>

</div>

`,

staff:`

<h1>👥 Staff Team</h1>

<p>

Staff selalu siap membantu jika kamu mengalami kendala atau memiliki pertanyaan.

</p>

<div class="box">

<h2>👑 Owner</h2>

<p>PASEP</p>

</div>

<div class="box">

<h2>🛡 Administrator</h2>

<p>Dyon</p>

</div>

<div class="box">

<h2>👮 Moderator</h2>

<p>Napzio</p>

<p>Nnux</p>

</div>

<p>

Jangan ragu untuk menghubungi Staff jika membutuhkan bantuan.

</p>

`,

faq:`

<h1>❓ Frequently Asked Questions</h1>

<h2>🎵 Music Bot tidak bisa dipakai?</h2>

<div class="box">

Pastikan bot sedang online dan kamu sudah berada di Voice Channel.

</div>

<h2>🎤 Temp Voice tidak muncul?</h2>

<div class="box">

Masuk melalui channel "➕ Buat Channel", lalu tunggu beberapa detik.

</div>

<h2>⭐ XP tidak bertambah?</h2>

<div class="box">

XP memiliki cooldown agar sistem tetap adil.

</div>

<h2>🪼 Masih bingung?</h2>

<div class="box">

Silakan hubungi Staff ARC.

Kami akan dengan senang hati membantu.

</div>

`

};

document.getElementById("page").innerHTML = pages.home;

function showPage(page,button){

document.getElementById("page").innerHTML=pages[page];

document.querySelectorAll(".menu button").forEach(btn=>{

btn.classList.remove("active");

});

button.classList.add("active");

}

/* Bubble tambahan otomatis */

const ocean=document.querySelector(".ocean");

for(let i=0;i<40;i++){

const b=document.createElement("div");

b.className="bubble";

const size=Math.random()*22+8;

b.style.width=size+"px";

b.style.height=size+"px";

b.style.left=Math.random()*100+"%";

b.style.animationDuration=(Math.random()*8+6)+"s";

b.style.animationDelay=(Math.random()*10)+"s";

ocean.appendChild(b);

}

</script>

</body>

</html>
